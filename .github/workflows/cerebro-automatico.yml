name: Segundo Cérebro — Automação Diária

on:
  schedule:
    - cron: '0 * * * *'      # :00 de toda hora — 24 execuções/dia
    - cron: '30 3-20 * * *'  # :30 das 00:30 às 17:30 BRT — 18 execuções/dia
    # total: 42 execuções/dia × 7 temas = 294 chamadas/dia
  workflow_dispatch:
    inputs:
      rotina:
        description: 'Rotina a executar'
        required: true
        default: 'pesquisa'
        type: choice
        options: [manha, pesquisa, noite, semana]

jobs:
  executar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout vault
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install openai duckduckgo-search

      - name: Determinar rotina pelo horário
        id: rotina
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "nome=${{ inputs.rotina }}" >> $GITHUB_OUTPUT
          else
            HORA=$(TZ="America/Fortaleza" date +%H)
            DIA=$(TZ="America/Fortaleza" date +%u)
            if [ "$HORA" = "07" ]; then
              echo "nome=manha" >> $GITHUB_OUTPUT
            elif [ "$HORA" = "22" ]; then
              echo "nome=noite" >> $GITHUB_OUTPUT
            elif [ "$HORA" = "18" ] && [ "$DIA" = "5" ]; then
              echo "nome=semana" >> $GITHUB_OUTPUT
            else
              echo "nome=pesquisa" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Executar rotina
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ROTINA: ${{ steps.rotina.outputs.nome }}
        run: python .github/scripts/cerebro.py

      - name: Commit e push das notas geradas
        run: |
          git config user.name "Segundo Cérebro Bot"
          git config user.email "caiobholanda2007@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma nota nova gerada."
          else
            git commit -m "auto: rotina ${{ steps.rotina.outputs.nome }} $(TZ='America/Fortaleza' date '+%Y-%m-%d %H:%M') BRT"
            git push
          fi
